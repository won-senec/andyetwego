<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" role="img" aria-label="Under construction">
  <defs>
    <linearGradient id="uc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ede6"/>
      <stop offset="1" stop-color="#e7ddd1"/>
    </linearGradient>
  </defs>

  <!-- ground -->
  <circle cx="130" cy="118" r="86" fill="url(#uc-sky)"/>

  <!-- barrier stripes -->
  <g transform="translate(46,150)">
    <rect x="0" y="0" width="168" height="18" rx="4" fill="#f4f0ea"/>
    <g fill="#805232">
      <polygon points="6,0 26,0 8,18 0,18 0,10"/>
      <polygon points="42,0 62,0 44,18 24,18"/>
      <polygon points="78,0 98,0 80,18 60,18"/>
      <polygon points="114,0 134,0 116,18 96,18"/>
      <polygon points="150,0 168,0 168,8 152,18 132,18"/>
    </g>
    <rect x="0" y="0" width="168" height="18" rx="4" fill="none" stroke="#805232" stroke-width="2"/>
  </g>
  <rect x="52" y="168" width="6" height="26" rx="2" fill="#7a685a"/>
  <rect x="202" y="168" width="6" height="26" rx="2" fill="#7a685a"/>

  <!-- hard hat -->
  <g transform="translate(130,86)">
    <path d="M-34 20 A34 34 0 0 1 34 20 Z" fill="#c8813f"/>
    <path d="M-14 -2 A14 26 0 0 1 14 -2 L14 12 L-14 12 Z" fill="#d9924b"/>
    <rect x="-42" y="18" width="84" height="9" rx="4.5" fill="#b26f30"/>
    <rect x="-6" y="-6" width="12" height="16" rx="3" fill="#e7a659"/>
  </g>

  <!-- wrench + gear accents -->
  <circle cx="72" cy="70" r="12" fill="none" stroke="#805232" stroke-width="4" stroke-dasharray="4 4"/>
  <circle cx="196" cy="60" r="8" fill="none" stroke="#805232" stroke-width="3.5" stroke-dasharray="3 3"/>
</svg>
